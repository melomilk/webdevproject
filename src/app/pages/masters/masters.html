<div class="masters-page">

  <!-- HERO -->
  <div class="hero">
    <h1>Our Masters</h1>
    <p>Choose your stylist and book your perfect look</p>
  </div>

  <!-- GRID -->
  <div class="masters-grid">

    @for (master of masters; track master.id) {

      <div class="master-card">

        <div class="avatar">
          <img [src]="master.image" alt="">
        </div>

        <h3>{{ master.name }}</h3>
        <p class="role">{{ master.role }}</p>

        <div class="rating">
          ★ {{ master.rating }}
        </div>

        <p class="bio">
          {{ master.bio }}
        </p>


      </div>

    }

  </div>

</div>
