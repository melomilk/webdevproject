<div class="masters">

  <h2>Our Masters 💇‍♀️</h2>

  @if (loading()) {
    <p>Loading masters...</p>
  }

  @if (error()) {
    <p>{{ error() }}</p>
  }

  @if (!loading() && !error()) {

    <div class="grid">

      @for (m of masters(); track m.id) {
        <div class="card" (click)="selectMaster(m)">
          <img [src]="'http://localhost:8000' + m.photo" />
          <h3>{{ m.name }}</h3>
          <p>{{ m.specialty }}</p>
          <p>{{ m.bio }}</p>
        </div>
      }

    </div>

  }

  @if (selectedMaster) {
    <div class="selected">
      <h2>{{ selectedMaster.name }}</h2>
    </div>
  }

</div>
