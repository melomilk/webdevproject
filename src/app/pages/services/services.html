<div class="services-page">

  <!-- HERO -->
  <div class="hero-card">
    <h1>Our Services</h1>
    <p>We take care of your beauty ✨</p>
  </div>

  <!-- GRID -->
  <div class="grid">

    <div class="card"
         *ngFor="let s of services"
         (click)="toggleService(s)">

      <h3>{{ s.name }}</h3>
      <p>{{ s.description }}</p>

      <!-- EXPAND (inside card) -->
      <div class="expand" *ngIf="selectedService === s">

        <ul>
          <li *ngFor="let item of s.items">
            {{ item }}
          </li>
        </ul>

      </div>

    </div>

  </div>

</div>
