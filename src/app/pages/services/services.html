<div class="page">

  <div class="hero-card">
    <h1>Our Services</h1>
    <p>We take care of your beauty ✨</p>
  </div>

  <div *ngIf="loading()" class="loading">Loading services...</div>

  <div *ngIf="error()" class="error">{{ error() }}</div>

  <div *ngIf="!loading() && !error()" class="service-grid">

    <div class="service-card"
         *ngFor="let s of services()"
         (click)="selectService(s)">

      <h3>{{ s.name }}</h3>
      <p>{{ s.description }}</p>
      <span>{{ s.price }} $</span>

    </div>

  </div>

  <div *ngIf="selectedService" class="selected">
    <h2>Selected: {{ selectedService.name }}</h2>
  </div>

</div>
