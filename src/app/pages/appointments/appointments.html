<div class="page">

  <div class="booking-card">
    <a class="back-btn" routerLink="/">← Back to Home</a>

    <h1>Book Appointment</h1>
    <p>Choose your service and preferred time</p>

    <form class="form" (ngSubmit)="submit()">

      <input type="text" [(ngModel)]="form.name" name="name" placeholder="Full Name" />

      <input type="text" [(ngModel)]="form.phone" name="phone" placeholder="Phone Number" />

      <select [(ngModel)]="form.service" name="service">
        <option value="">Select Service</option>
        <option>Hair Styling</option>
        <option>Makeup</option>
        <option>Nails</option>
        <option>Skincare</option>
      </select>

      <input type="date" [(ngModel)]="form.date" name="date" />
      <input type="time" [(ngModel)]="form.time" name="time" />

      <button type="submit">Confirm Booking</button>

    </form>

    <p *ngIf="success">✅ Booking successful!</p>
    <p *ngIf="error">❌ Something went wrong</p>

  </div>

</div>
