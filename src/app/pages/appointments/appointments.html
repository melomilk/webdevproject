<div class="page">
  <div class="booking-card">
    <a class="back-btn" routerLink="/">← Back to Home</a>

    <h1>Book Appointment</h1>
    <p>Choose your service and preferred time</p>

    <form class="form" (ngSubmit)="submit()">
      <input
        type="text"
        [(ngModel)]="form.name"
        name="name"
        placeholder="Full Name"
        [disabled]="submitting"
      />

      <input
        type="text"
        [(ngModel)]="form.phone"
        name="phone"
        placeholder="Phone Number"
        [disabled]="submitting"
      />

      <select
        [(ngModel)]="form.service"
        name="service"
        [disabled]="submitting"
      >
        <option [ngValue]="''">Select Service</option>
        @for (service of services(); track service.id) {
          <option [ngValue]="service.id">
            {{ service.name }} — ${{ service.price }}
          </option>
        }
      </select>

      <input
        type="date"
        [(ngModel)]="form.date"
        name="date"
        [disabled]="submitting"
      />
      <input
        type="time"
        [(ngModel)]="form.time"
        name="time"
        [disabled]="submitting"
      />

      <button type="submit" [disabled]="submitting">
        @if (submitting) {
          Booking...
        } @else {
          Confirm Booking
        }
      </button>
    </form>

    @if (success) {
      <p class="success">✅ Booking successful! We'll call you to confirm.</p>
    }

    @if (error) {
      <p class="error">❌ {{ error }}</p>
    }
    <!-- <p>DEBUG: submitting = {{ submitting }}, success = {{ success }}</p> -->
  </div>
</div>
